<p>prompt:
请用使用markmap格式，
1、以多层级结构化格式来归纳总结文章所有的要点、子要点、下级要点以及各级要点的概述.
2、在概述每个主要要点时,需要列出至少3个具有代表性和重要性的细节点进行阐述,每个细节点需要2-3句话进行概括,不能只用一两句话轻轻带过。
3、各个要点之间需要呈现逻辑递进关系,最后的全文主旨要能统领全文,不能只是段落摘要的机械堆砌。</p>
