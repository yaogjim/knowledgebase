<p>prompt:
请完成以下工作，并将回复的内容用markdown格式展示：
	1、概述文章内容；
	2、概述作者写作意图；
	3、给出你认为最有价值的三个观点；
	4、给出你不认同本文的哪些内容，给出理由。
	5、给出你在文章发现的有深度有意义的3～5个观点，说说理由。
	6、请罗列出文中至少5个讲得十分精彩的片段，每个片段给出你的点评。</p>
